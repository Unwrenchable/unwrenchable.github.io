<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.github.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
    <title>Admin — Unwrenchable</title>
    <link rel="stylesheet" href="assets/css/tailwind.min.css">
    <link rel="stylesheet" href="assets/css/press-start-2p.css">
    <link rel="stylesheet" href="assets/css/all.min.css">
    <style>
        body { font-family: 'Press Start 2P', monospace; }
        .neon-text { text-shadow: 0 0 10px #00ff9d, 0 0 20px #00ff9d; }
        .msg-card { transition: border-color .2s; }
        .msg-card.unread { border-left: 4px solid #84cc16; }
        .msg-card.read   { border-left: 4px solid rgba(132,204,22,.2); opacity: .7; }
    </style>
</head>
<body class="bg-zinc-950 text-lime-400 min-h-screen overflow-x-hidden">

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 bg-black/90 border-b border-lime-500 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-lime-500 rounded-full flex items-center justify-center text-black font-bold">U</div>
                <span class="text-xl tracking-widest neon-text">UNWRENCHABLE</span>
                <span class="text-xs opacity-50 ml-4">// ADMIN</span>
            </div>
            <div class="flex gap-4 items-center">
                <a href="index.html" class="text-xs tracking-widest opacity-60 hover:opacity-100 transition-all">← BACK TO SITE</a>
                <button id="logout-btn" onclick="logout()"
                        class="hidden px-4 py-2 border border-lime-500 text-xs tracking-widest hover:bg-lime-500 hover:text-black transition-all">
                    LOGOUT
                </button>
            </div>
        </div>
    </nav>

    <div class="pt-24 max-w-5xl mx-auto px-6 pb-24">

        <!-- LOGIN SCREEN -->
        <div id="login-screen">
            <div class="min-h-[70vh] flex items-center justify-center">
                <div class="w-full max-w-sm bg-zinc-900 border border-lime-500 p-10 rounded-2xl">
                    <h1 class="text-2xl neon-text mb-2 text-center">ADMIN</h1>
                    <p class="text-xs opacity-40 text-center mb-8 tracking-widest">RESTRICTED ACCESS</p>
                    <form id="login-form" class="space-y-5" onsubmit="doLogin(event)">
                        <input type="password" id="admin-pw" placeholder="PASSWORD" autocomplete="current-password"
                               class="w-full bg-black border border-lime-500 p-4 text-lime-400 placeholder-lime-400/50 focus:outline-none text-xs tracking-widest">
                        <input type="password" id="admin-pat" placeholder="GITHUB PAT (to manage)" autocomplete="off"
                               class="w-full bg-black border border-lime-500/50 p-4 text-lime-400 placeholder-lime-400/30 focus:outline-none text-xs tracking-widest">
                        <p class="text-xs opacity-30 tracking-widest -mt-2">PAT optional — read-only without it</p>
                        <button type="submit"
                                class="w-full py-4 bg-lime-500 text-black font-bold hover:bg-lime-400 transition-all text-xs tracking-widest">
                            ENTER →
                        </button>
                        <p id="login-err" class="hidden text-center text-red-400 text-xs tracking-widest">INCORRECT PASSWORD</p>
                    </form>
                </div>
            </div>
        </div>

        <!-- DASHBOARD (shown after login) -->
        <div id="dashboard" class="hidden">

            <div class="flex items-center justify-between mb-10">
                <div>
                    <h1 class="text-3xl neon-text mb-2">MESSAGES</h1>
                    <p class="text-xs opacity-40 tracking-widest">Contact form submissions via GitHub Issues</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="markAllRead()"
                            class="px-4 py-2 border border-lime-500/50 text-xs tracking-widest hover:border-lime-500 transition-all">
                        MARK ALL READ
                    </button>
                    <button onclick="clearAll()"
                            class="px-4 py-2 border border-red-500/50 text-red-400 text-xs tracking-widest hover:border-red-500 transition-all">
                        CLOSE ALL
                    </button>
                    <button onclick="loadMessages()"
                            class="px-4 py-2 border border-lime-500/50 text-xs tracking-widest hover:border-lime-500 transition-all">
                        ↻ REFRESH
                    </button>
                </div>
            </div>

            <!-- Stats bar -->
            <div class="grid grid-cols-3 gap-4 mb-10">
                <div class="bg-zinc-900 border border-lime-500/30 p-5 rounded-xl text-center">
                    <div id="stat-total" class="text-3xl font-bold text-lime-300 mb-1">0</div>
                    <div class="text-xs opacity-50 tracking-widest">TOTAL</div>
                </div>
                <div class="bg-zinc-900 border border-lime-500/30 p-5 rounded-xl text-center">
                    <div id="stat-unread" class="text-3xl font-bold text-lime-300 mb-1">0</div>
                    <div class="text-xs opacity-50 tracking-widest">UNREAD</div>
                </div>
                <div class="bg-zinc-900 border border-lime-500/30 p-5 rounded-xl text-center">
                    <div id="stat-read" class="text-3xl font-bold text-lime-300 mb-1">0</div>
                    <div class="text-xs opacity-50 tracking-widest">READ</div>
                </div>
            </div>

            <!-- Filter tabs -->
            <div class="flex gap-3 mb-6 text-xs tracking-widest">
                <button onclick="setFilter('all')"   id="f-all"    class="filter-btn px-4 py-2 border border-lime-500 bg-lime-500/10 text-lime-400">ALL</button>
                <button onclick="setFilter('unread')" id="f-unread" class="filter-btn px-4 py-2 border border-lime-500/30 hover:border-lime-500 transition-all">UNREAD</button>
                <button onclick="setFilter('read')"   id="f-read"   class="filter-btn px-4 py-2 border border-lime-500/30 hover:border-lime-500 transition-all">READ</button>
            </div>

            <!-- Loading indicator -->
            <div id="loading-state" class="hidden text-center py-12 opacity-50">
                <p class="text-xs tracking-widest">LOADING…</p>
            </div>

            <!-- Message list -->
            <div id="msg-list" class="space-y-4"></div>

            <!-- Empty state -->
            <div id="empty-state" class="hidden text-center py-24 opacity-40">
                <div class="text-5xl mb-4">📭</div>
                <p class="text-sm tracking-widest">NO MESSAGES YET</p>
            </div>

        </div>
    </div>

    <!-- CONFIRM MODAL -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 border border-red-500 p-10 max-w-sm w-full rounded-2xl text-center">
            <p class="text-sm tracking-widest mb-2 text-red-400">⚠ CLOSE ALL MESSAGES?</p>
            <p class="text-xs opacity-50 mb-8">Issues will be closed on GitHub.</p>
            <div class="flex gap-4">
                <button onclick="confirmClear(false)"
                        class="flex-1 py-3 border border-lime-500/50 text-xs tracking-widest hover:border-lime-500 transition-all">
                    CANCEL
                </button>
                <button onclick="confirmClear(true)"
                        class="flex-1 py-3 border border-red-500 text-red-400 text-xs tracking-widest hover:bg-red-500 hover:text-black transition-all">
                    CLOSE ALL
                </button>
            </div>
        </div>
    </div>

    <script>
        // ── CONFIG ─────────────────────────────────────────────────────────────
        const GH_OWNER = 'Unwrenchable';
        const GH_REPO  = 'unwrenchable.github.io';
        const GH_LABEL = 'contact-form';
        const GH_API   = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}`;

        // ── PASSWORD AUTHENTICATION ────────────────────────────────────────────
        // NOTE: This is a client-side-only password check suitable for a static
        // GitHub Pages site. It prevents casual access but is not a substitute
        // for server-side auth. The hash below is SHA-256("vault77").
        // To change the password, run: echo -n "yourpassword" | sha256sum
        // and replace the hash constant below.
        const ADMIN_HASH = '928e6f4bc3d6c1f38b563b7696d0b02747bebd2c78926f4659a9cc405f94827a';
        const SESSION_KEY = 'admin_auth';
        const PAT_KEY     = 'admin_pat';

        async function sha256(str) {
            const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function doLogin(e) {
            e.preventDefault();
            const pw   = document.getElementById('admin-pw').value;
            const pat  = document.getElementById('admin-pat').value.trim();
            const hash = await sha256(pw);
            if (hash === ADMIN_HASH) {
                sessionStorage.setItem(SESSION_KEY, '1');
                if (pat) sessionStorage.setItem(PAT_KEY, pat);
                showDashboard();
            } else {
                const err = document.getElementById('login-err');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
                document.getElementById('admin-pw').value = '';
            }
        }

        function logout() {
            sessionStorage.removeItem(SESSION_KEY);
            sessionStorage.removeItem(PAT_KEY);
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('logout-btn').classList.add('hidden');
            document.getElementById('admin-pw').value = '';
            document.getElementById('admin-pat').value = '';
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            loadMessages();
        }

        // Auto-login if session is still active
        if (sessionStorage.getItem(SESSION_KEY) === '1') {
            showDashboard();
        }

        // ── GITHUB ISSUES API ──────────────────────────────────────────────────
        function getPat() { return sessionStorage.getItem(PAT_KEY) || ''; }

        function ghHeaders(withAuth = false) {
            const h = {
                'Accept': 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
            };
            const pat = getPat();
            if (withAuth && pat) h['Authorization'] = `Bearer ${pat}`;
            return h;
        }

        // Fetch all contact-form issues (open = unread, closed = read)
        async function fetchIssues(state) {
            const url = `${GH_API}/issues?labels=${encodeURIComponent(GH_LABEL)}&state=${state}&per_page=100`;
            const res = await fetch(url, { headers: ghHeaders(true) });
            if (!res.ok) throw new Error(`GitHub API ${res.status}`);
            return res.json();
        }

        // Parse the structured body written by the contact form
        function parseBody(issue) {
            const raw = issue.body || '';
            const nameMatch  = raw.match(/^\*\*Name:\*\*\s*(.+)$/m);
            const emailMatch = raw.match(/^\*\*Email:\*\*\s*(.+)$/m);
            // Everything after the "---" separator is the message
            const parts   = raw.split(/^---$/m);
            const msgText = parts.length > 1 ? parts.slice(1).join('---').trim() : raw.trim();
            return {
                name:    nameMatch  ? nameMatch[1].trim()  : (issue.title.replace(/^\[Contact Form\]\s*/i, '') || 'Anonymous'),
                email:   emailMatch ? emailMatch[1].trim() : '',
                message: msgText,
            };
        }

        let allIssues   = [];
        let activeFilter = 'all';

        async function loadMessages() {
            const loading = document.getElementById('loading-state');
            const list    = document.getElementById('msg-list');
            const empty   = document.getElementById('empty-state');
            loading.classList.remove('hidden');
            list.innerHTML = '';
            empty.classList.add('hidden');

            try {
                const [open, closed] = await Promise.all([
                    fetchIssues('open'),
                    fetchIssues('closed'),
                ]);
                allIssues = [
                    ...open.map(i   => ({ ...i, read: false })),
                    ...closed.map(i => ({ ...i, read: true  })),
                ].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            } catch (err) {
                loading.classList.add('hidden');
                list.innerHTML = `<p class="text-red-400 text-xs tracking-widest text-center py-8">FAILED TO LOAD: ${escHtml(err.message)}</p>`;
                return;
            }

            loading.classList.add('hidden');
            renderMessages();
        }

        function setFilter(f) {
            activeFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.className = 'filter-btn px-4 py-2 border border-lime-500/30 hover:border-lime-500 transition-all';
            });
            const active = document.getElementById('f-' + f);
            active.className = 'filter-btn px-4 py-2 border border-lime-500 bg-lime-500/10 text-lime-400';
            renderMessages();
        }

        function renderMessages() {
            const shown = activeFilter === 'unread' ? allIssues.filter(m => !m.read)
                        : activeFilter === 'read'   ? allIssues.filter(m =>  m.read)
                        : allIssues;

            document.getElementById('stat-total').textContent  = allIssues.length;
            document.getElementById('stat-unread').textContent = allIssues.filter(m => !m.read).length;
            document.getElementById('stat-read').textContent   = allIssues.filter(m =>  m.read).length;

            const list  = document.getElementById('msg-list');
            const empty = document.getElementById('empty-state');

            if (shown.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            const hasPat = !!getPat();

            list.innerHTML = shown.map(m => {
                const parsed   = parseBody(m);
                const d        = new Date(m.created_at);
                const date     = d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
                const time     = d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
                const isUnread = !m.read;
                return `
                <div class="msg-card bg-zinc-900 border border-lime-500/30 p-6 rounded-xl ${isUnread ? 'unread' : 'read'}">
                    <div class="flex items-start justify-between gap-4 mb-4">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                ${isUnread ? '<span class="text-xs bg-lime-500 text-black px-2 py-0.5 tracking-widest">NEW</span>' : ''}
                                <span class="font-bold text-lime-300">${escHtml(parsed.name)}</span>
                            </div>
                            ${parsed.email ? `<a href="mailto:${escHtml(parsed.email)}" class="text-xs text-lime-400/60 hover:text-lime-400 transition-all">${escHtml(parsed.email)}</a>` : ''}
                        </div>
                        <div class="text-right shrink-0">
                            <div class="text-xs opacity-50">${date}</div>
                            <div class="text-xs opacity-30">${time}</div>
                            <a href="${escHtml(m.html_url)}" target="_blank" rel="noopener noreferrer"
                               class="text-xs opacity-30 hover:opacity-60 transition-all">#${m.number}</a>
                        </div>
                    </div>
                    <p class="text-sm text-lime-200/80 leading-relaxed whitespace-pre-wrap mb-5">${escHtml(parsed.message)}</p>
                    <div class="flex gap-3 text-xs tracking-widest flex-wrap">
                        ${hasPat ? `<button onclick="toggleRead(${m.number}, ${isUnread})"
                                class="px-3 py-1.5 border border-lime-500/50 hover:border-lime-500 transition-all">
                            ${isUnread ? 'MARK READ' : 'MARK UNREAD'}
                        </button>` : ''}
                        ${parsed.email ? `<a href="mailto:${escHtml(parsed.email)}"
                                class="px-3 py-1.5 border border-lime-500/50 hover:border-lime-500 transition-all">
                            REPLY ✉
                        </a>` : ''}
                        <a href="${escHtml(m.html_url)}" target="_blank" rel="noopener noreferrer"
                           class="px-3 py-1.5 border border-lime-500/50 hover:border-lime-500 transition-all">
                            VIEW ON GITHUB ↗
                        </a>
                        ${hasPat ? `<button onclick="deleteMsg(${m.number})"
                                class="px-3 py-1.5 border border-red-500/40 text-red-400 hover:border-red-500 transition-all ml-auto">
                            CLOSE
                        </button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // Patch a GitHub issue state (open/closed)
        async function patchIssue(number, payload) {
            const pat = getPat();
            if (!pat) { alert('A GitHub PAT is required to manage issues. Log out and log back in, entering your PAT in the GITHUB PAT field.'); return false; }
            const res = await fetch(`${GH_API}/issues/${number}`, {
                method: 'PATCH',
                headers: { ...ghHeaders(true), 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            return res.ok;
        }

        async function toggleRead(number, currentlyUnread) {
            const newState = currentlyUnread ? 'closed' : 'open';
            const ok = await patchIssue(number, { state: newState });
            if (ok) {
                const issue = allIssues.find(i => i.number === number);
                if (issue) issue.read = currentlyUnread;
                renderMessages();
            }
        }

        async function deleteMsg(number) {
            const ok = await patchIssue(number, { state: 'closed' });
            if (ok) {
                const issue = allIssues.find(i => i.number === number);
                if (issue) issue.read = true;
                renderMessages();
            }
        }

        async function markAllRead() {
            const pat = getPat();
            if (!pat) { alert('A GitHub PAT is required to manage issues. Log out and log back in, entering your PAT in the GITHUB PAT field.'); return; }
            const unread = allIssues.filter(i => !i.read);
            await Promise.all(unread.map(i => patchIssue(i.number, { state: 'closed' })));
            unread.forEach(i => { i.read = true; });
            renderMessages();
        }

        function clearAll() {
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        async function confirmClear(ok) {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (!ok) return;
            const pat = getPat();
            if (!pat) { alert('A GitHub PAT is required to manage issues. Log out and log back in, entering your PAT in the GITHUB PAT field.'); return; }
            const open = allIssues.filter(i => !i.read);
            await Promise.all(open.map(i => patchIssue(i.number, { state: 'closed' })));
            open.forEach(i => { i.read = true; });
            renderMessages();
        }

        function escHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    </script>
</body>
</html>
