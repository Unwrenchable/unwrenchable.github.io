<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Unwrenchable</title>
    <link rel="stylesheet" href="assets/css/tailwind.min.css">
    <link rel="stylesheet" href="assets/css/press-start-2p.css">
    <link rel="stylesheet" href="assets/css/all.min.css">
    <style>
        body { font-family: 'Press Start 2P', monospace; }
        .neon-text { text-shadow: 0 0 10px #00ff9d, 0 0 20px #00ff9d; }
        .msg-card { transition: border-color .2s; }
        .msg-card.unread { border-left: 4px solid #84cc16; }
        .msg-card.read   { border-left: 4px solid rgba(132,204,22,.2); opacity: .7; }
    </style>
</head>
<body class="bg-zinc-950 text-lime-400 min-h-screen overflow-x-hidden">

    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 bg-black/90 border-b border-lime-500 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-lime-500 rounded-full flex items-center justify-center text-black font-bold">U</div>
                <span class="text-xl tracking-widest neon-text">UNWRENCHABLE</span>
                <span class="text-xs opacity-50 ml-4">// ADMIN</span>
            </div>
            <div class="flex gap-4 items-center">
                <a href="index.html" class="text-xs tracking-widest opacity-60 hover:opacity-100 transition-all">← BACK TO SITE</a>
                <button id="logout-btn" onclick="logout()"
                        class="hidden px-4 py-2 border border-lime-500 text-xs tracking-widest hover:bg-lime-500 hover:text-black transition-all">
                    LOGOUT
                </button>
            </div>
        </div>
    </nav>

    <div class="pt-24 max-w-5xl mx-auto px-6 pb-24">

        <!-- LOGIN SCREEN -->
        <div id="login-screen">
            <div class="min-h-[70vh] flex items-center justify-center">
                <div class="w-full max-w-sm bg-zinc-900 border border-lime-500 p-10 rounded-2xl">
                    <h1 class="text-2xl neon-text mb-2 text-center">ADMIN</h1>
                    <p class="text-xs opacity-40 text-center mb-8 tracking-widest">RESTRICTED ACCESS</p>
                    <form id="login-form" class="space-y-5" onsubmit="doLogin(event)">
                        <input type="password" id="admin-pw" placeholder="PASSWORD"
                               class="w-full bg-black border border-lime-500 p-4 text-lime-400 placeholder-lime-400/50 focus:outline-none text-xs tracking-widest">
                        <button type="submit"
                                class="w-full py-4 bg-lime-500 text-black font-bold hover:bg-lime-400 transition-all text-xs tracking-widest">
                            ENTER →
                        </button>
                        <p id="login-err" class="hidden text-center text-red-400 text-xs tracking-widest">INCORRECT PASSWORD</p>
                    </form>
                </div>
            </div>
        </div>

        <!-- DASHBOARD (shown after login) -->
        <div id="dashboard" class="hidden">

            <div class="flex items-center justify-between mb-10">
                <div>
                    <h1 class="text-3xl neon-text mb-2">MESSAGES</h1>
                    <p class="text-xs opacity-40 tracking-widest">Contact form submissions</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="markAllRead()"
                            class="px-4 py-2 border border-lime-500/50 text-xs tracking-widest hover:border-lime-500 transition-all">
                        MARK ALL READ
                    </button>
                    <button onclick="clearAll()"
                            class="px-4 py-2 border border-red-500/50 text-red-400 text-xs tracking-widest hover:border-red-500 transition-all">
                        CLEAR ALL
                    </button>
                </div>
            </div>

            <!-- Stats bar -->
            <div class="grid grid-cols-3 gap-4 mb-10">
                <div class="bg-zinc-900 border border-lime-500/30 p-5 rounded-xl text-center">
                    <div id="stat-total" class="text-3xl font-bold text-lime-300 mb-1">0</div>
                    <div class="text-xs opacity-50 tracking-widest">TOTAL</div>
                </div>
                <div class="bg-zinc-900 border border-lime-500/30 p-5 rounded-xl text-center">
                    <div id="stat-unread" class="text-3xl font-bold text-lime-300 mb-1">0</div>
                    <div class="text-xs opacity-50 tracking-widest">UNREAD</div>
                </div>
                <div class="bg-zinc-900 border border-lime-500/30 p-5 rounded-xl text-center">
                    <div id="stat-read" class="text-3xl font-bold text-lime-300 mb-1">0</div>
                    <div class="text-xs opacity-50 tracking-widest">READ</div>
                </div>
            </div>

            <!-- Filter tabs -->
            <div class="flex gap-3 mb-6 text-xs tracking-widest">
                <button onclick="setFilter('all')"   id="f-all"    class="filter-btn px-4 py-2 border border-lime-500 bg-lime-500/10 text-lime-400">ALL</button>
                <button onclick="setFilter('unread')" id="f-unread" class="filter-btn px-4 py-2 border border-lime-500/30 hover:border-lime-500 transition-all">UNREAD</button>
                <button onclick="setFilter('read')"   id="f-read"   class="filter-btn px-4 py-2 border border-lime-500/30 hover:border-lime-500 transition-all">READ</button>
            </div>

            <!-- Message list -->
            <div id="msg-list" class="space-y-4"></div>

            <!-- Empty state -->
            <div id="empty-state" class="hidden text-center py-24 opacity-40">
                <div class="text-5xl mb-4">📭</div>
                <p class="text-sm tracking-widest">NO MESSAGES YET</p>
            </div>

        </div>
    </div>

    <!-- CONFIRM MODAL -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 border border-red-500 p-10 max-w-sm w-full rounded-2xl text-center">
            <p class="text-sm tracking-widest mb-2 text-red-400">⚠ CLEAR ALL MESSAGES?</p>
            <p class="text-xs opacity-50 mb-8">This cannot be undone.</p>
            <div class="flex gap-4">
                <button onclick="confirmClear(false)"
                        class="flex-1 py-3 border border-lime-500/50 text-xs tracking-widest hover:border-lime-500 transition-all">
                    CANCEL
                </button>
                <button onclick="confirmClear(true)"
                        class="flex-1 py-3 border border-red-500 text-red-400 text-xs tracking-widest hover:bg-red-500 hover:text-black transition-all">
                    DELETE ALL
                </button>
            </div>
        </div>
    </div>

    <script>
        // ── PASSWORD AUTHENTICATION ────────────────────────────────────────────
        // NOTE: This is a client-side-only password check suitable for a static
        // GitHub Pages site. It prevents casual access but is not a substitute
        // for server-side auth. The hash below is SHA-256("vault77").
        // To change the password, run: echo -n "yourpassword" | sha256sum
        // and replace the hash constant below.
        const ADMIN_HASH = '928e6f4bc3d6c1f38b563b7696d0b02747bebd2c78926f4659a9cc405f94827a';
        const SESSION_KEY = 'admin_auth';

        async function sha256(str) {
            const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function doLogin(e) {
            e.preventDefault();
            const pw   = document.getElementById('admin-pw').value;
            const hash = await sha256(pw);
            if (hash === ADMIN_HASH) {
                sessionStorage.setItem(SESSION_KEY, '1');
                showDashboard();
            } else {
                const err = document.getElementById('login-err');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
                document.getElementById('admin-pw').value = '';
            }
        }

        function logout() {
            sessionStorage.removeItem(SESSION_KEY);
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('logout-btn').classList.add('hidden');
            document.getElementById('admin-pw').value = '';
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            renderMessages();
        }

        // Auto-login if session is still active
        if (sessionStorage.getItem(SESSION_KEY) === '1') {
            showDashboard();
        }

        // ── MESSAGES DATA ──────────────────────────────────────────────────────
        const MSG_KEY = 'admin_messages';
        let activeFilter = 'all';

        function getMessages() {
            return JSON.parse(localStorage.getItem(MSG_KEY) || '[]');
        }

        function saveMessages(msgs) {
            localStorage.setItem(MSG_KEY, JSON.stringify(msgs));
        }

        function setFilter(f) {
            activeFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.className = 'filter-btn px-4 py-2 border border-lime-500/30 hover:border-lime-500 transition-all';
            });
            const active = document.getElementById('f-' + f);
            active.className = 'filter-btn px-4 py-2 border border-lime-500 bg-lime-500/10 text-lime-400';
            renderMessages();
        }

        function renderMessages() {
            const all   = getMessages().sort((a, b) => b.id - a.id);
            const shown = activeFilter === 'unread' ? all.filter(m => !m.read)
                        : activeFilter === 'read'   ? all.filter(m =>  m.read)
                        : all;

            document.getElementById('stat-total').textContent  = all.length;
            document.getElementById('stat-unread').textContent = all.filter(m => !m.read).length;
            document.getElementById('stat-read').textContent   = all.filter(m =>  m.read).length;

            const list = document.getElementById('msg-list');
            const empty = document.getElementById('empty-state');

            if (shown.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            list.innerHTML = shown.map(m => {
                const d    = new Date(m.date);
                const date = d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
                const time = d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
                const isUnread = !m.read;
                return `
                <div class="msg-card bg-zinc-900 border border-lime-500/30 p-6 rounded-xl ${isUnread ? 'unread' : 'read'}">
                    <div class="flex items-start justify-between gap-4 mb-4">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                ${isUnread ? '<span class="text-xs bg-lime-500 text-black px-2 py-0.5 tracking-widest">NEW</span>' : ''}
                                <span class="font-bold text-lime-300">${escHtml(m.name || 'Anonymous')}</span>
                            </div>
                            ${m.email ? `<a href="mailto:${escHtml(m.email)}" class="text-xs text-lime-400/60 hover:text-lime-400 transition-all">${escHtml(m.email)}</a>` : ''}
                        </div>
                        <div class="text-right shrink-0">
                            <div class="text-xs opacity-50">${date}</div>
                            <div class="text-xs opacity-30">${time}</div>
                        </div>
                    </div>
                    <p class="text-sm text-lime-200/80 leading-relaxed whitespace-pre-wrap mb-5">${escHtml(m.message || '')}</p>
                    <div class="flex gap-3 text-xs tracking-widest">
                        <button onclick="toggleRead(${m.id})"
                                class="px-3 py-1.5 border border-lime-500/50 hover:border-lime-500 transition-all">
                            ${isUnread ? 'MARK READ' : 'MARK UNREAD'}
                        </button>
                        ${m.email ? `<a href="mailto:${escHtml(m.email)}"
                                class="px-3 py-1.5 border border-lime-500/50 hover:border-lime-500 transition-all">
                            REPLY ✉
                        </a>` : ''}
                        <button onclick="deleteMsg(${m.id})"
                                class="px-3 py-1.5 border border-red-500/40 text-red-400 hover:border-red-500 transition-all ml-auto">
                            DELETE
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleRead(id) {
            const msgs = getMessages().map(m => m.id === id ? { ...m, read: !m.read } : m);
            saveMessages(msgs);
            renderMessages();
        }

        function deleteMsg(id) {
            const msgs = getMessages().filter(m => m.id !== id);
            saveMessages(msgs);
            renderMessages();
        }

        function markAllRead() {
            const msgs = getMessages().map(m => ({ ...m, read: true }));
            saveMessages(msgs);
            renderMessages();
        }

        function clearAll() {
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function confirmClear(ok) {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (!ok) return;
            localStorage.removeItem(MSG_KEY);
            renderMessages();
        }

        function escHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    </script>
</body>
</html>
